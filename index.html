<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>깃깃 (GitGit) - Modern Development Hub</title>
    <meta name="description" content="깃깃(GitGit) 프로젝트의 메인 페이지입니다. 현대적인 디자인과 효율적인 개발 환경을 지향합니다.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030712;
            --accent-primary: #6366f1;
            --accent-secondary: #a855f7;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Ambient Background Shadows */
        .ambient-light {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .light-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            animation: float 20s infinite alternate ease-in-out;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: var(--accent-primary);
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            width: 500px;
            height: 500px;
            background: var(--accent-secondary);
            bottom: -150px;
            right: -150px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        .container {
            max-width: 800px;
            padding: 40px;
            text-align: center;
            z-index: 1;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 60px 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 24px;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn {
            display: inline-block;
            padding: 16px 32px;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            color: white;
            text-decoration: none;
            border-radius: 100px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.5);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 60px;
            text-align: left;
        }

        .feature-item {
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .feature-item h3 {
            font-size: 1rem;
            margin-bottom: 8px;
            color: #fff;
        }

        .feature-item p {
            font-size: 0.9rem;
            margin-bottom: 0;
            color: var(--text-muted);
        }

        @media (max-width: 640px) {
            .container {
                padding: 20px;
            }
            .glass-card {
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="ambient-light">
        <div class="light-blob blob-1"></div>
        <div class="light-blob blob-2"></div>
    </div>

    <main class="container">
        <div class="glass-card">
            <h1 id="main-title">깃깃 (GitGit)</h1>
            <p>
                현대적인 웹 기술을 활용하여 더 나은 사용자 경험을 창조합니다.<br>
                프로젝트의 첫 시작을 함께하는 랜딩 페이지입니다.
            </p>
            <a href="#" class="btn" id="cta-button">시작하기</a>

            <div class="features">
                <div class="feature-item">
                    <h3>Premium Design</h3>
                    <p>글래스모피즘과 세련된 그라데이션을 적용했습니다.</p>
                </div>
                <div class="feature-item">
                    <h3>Responsive</h3>
                    <p>모든 기기에서 완벽하게 작동하는 반응형 레이아웃입니다.</p>
                </div>
                <div class="feature-item">
                    <h3>Clean Code</h3>
                    <h3>Semantic HTML5와 모던 CSS를 사용합니다.</h3>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
